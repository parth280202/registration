<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Gauri 💌</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', cursive;
  background: linear-gradient(135deg, #ffdde1, #ee9ca7);
  overflow: hidden;
}

/* overlay */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  z-index: 1;
}

/* hearts */
.hearts {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.heart {
  position: absolute;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh); opacity: 0; }
  30% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* containers */
.container {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 2;
  position: relative;
  text-align: center;
  padding: 20px;
}

.active {
  display: flex;
  animation: fadeScene 0.8s ease;
}

@keyframes fadeScene {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

/* envelope */
.envelope {
  width: 260px;
  height: 160px;
  background: white;
  border-radius: 10px;
  position: relative;
  box-shadow: 0 0 40px rgba(255,255,255,0.6);
  overflow: hidden;
}

.flap {
  position: absolute;
  width: 100%;
  height: 80px;
  background: #ff6b81;
  clip-path: polygon(0 0, 50% 100%, 100% 0);
}

.inner-letter {
  position: absolute;
  width: 90%;
  height: 140px;
  background: #fff;
  left: 5%;
  top: 20px;
  border-radius: 10px;
  transform: translateY(100%);
  transition: 1.2s ease;
}

.envelope.open .inner-letter {
  transform: translateY(-20%);
}

/* buttons */
button {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: #ff6b81;
  color: white;
  cursor: pointer;
}

/* letter */
.letter {
  width: 340px;
  max-width: 90%;
  padding: 20px;
  background: rgba(255,255,255,0.95);
  border-radius: 20px;
  opacity: 0;
  transform: scale(0.8);
  transition: 0.6s;
}

.letter.show {
  opacity: 1;
  transform: scale(1);
  animation: heartbeat 2s infinite;
}

@keyframes heartbeat {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}

/* options */
.options {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 12px;
  max-width: 400px;
}

.option {
  padding: 18px;
  border-radius: 18px;
  cursor: pointer;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.2);
  color: white;
  transition: 0.4s;
  border: 1px solid rgba(255,255,255,0.3);
}

.option:hover {
  transform: scale(1.08);
  background: rgba(255,255,255,0.4);
  box-shadow: 0 0 20px rgba(255,255,255,0.6);
}

/* NEW time UI */
.time-options {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 10px;
}

.time-card {
  padding: 10px 15px;
  border-radius: 15px;
  background: rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.time-card.active {
  background: #ff6b81;
  transform: scale(1.1);
}

/* final */
.thankyou {
  font-size: 22px;
  color: white;
}

/* confetti */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  top: 0;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(720deg);
    opacity: 0;
  }
}

/* mobile */
@media(max-width:600px){
  .options{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="overlay"></div>
<div class="hearts" id="hearts"></div>

<!-- Step 1 -->
<div id="step1" class="container active">
  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="inner-letter"></div>
  </div>
  <button onclick="openEnvelope()">Open 💌</button>
</div>

<!-- Step 2 -->
<div id="step2" class="container">
  <div id="letter" class="letter">
    <p id="typewriter"></p>
    <button onclick="goToOptions()">Yes 💖</button>
    <button id="noBtn">No 🙈</button>
  </div>
</div>

<!-- Step 3 -->
<div id="step3" class="container">
  <h2>Pick our vibe 🌸</h2>
  <div class="options">
    <div class="option" onclick="selectOption('Sunset Drive')">🌅 Sunset Drive</div>
    <div class="option" onclick="selectOption('Coastal Ride')">🌊 Coastal Ride</div>
    <div class="option" onclick="selectOption('Night Ride')">🌙 Night Ride</div>
    <div class="option" onclick="selectOption('Arcade & Bowling')">🎳 Arcade</div>
    <div class="option" onclick="selectOption('Bike Ride')">🏍️ Bike Ride</div>
    <div class="option" onclick="selectOption('Cafe Date')">☕ Cafe</div>
    <div class="option" onclick="selectOption('Movie Date')">🎬 Movie</div>
  </div>
</div>

<!-- Step 4 -->
<div id="step4" class="container">
  <h2>Select Date 💫</h2>
  <input type="date" id="date">

  <div class="time-options">
    <div class="time-card" onclick="selectTime(this,'Morning')">☀️ Morning</div>
    <div class="time-card" onclick="selectTime(this,'Afternoon')">🌤️ Afternoon</div>
    <div class="time-card" onclick="selectTime(this,'Evening')">🌆 Evening</div>
    <div class="time-card" onclick="selectTime(this,'Night')">🌙 Night</div>
  </div>

  <button onclick="finish()">Done 💖</button>
</div>

<!-- Step 5 -->
<div id="step5" class="container">
  <div id="finalMessage" class="thankyou"></div>
</div>

<audio id="bgMusic" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
document.body.addEventListener("click",()=>{
  document.getElementById("bgMusic").play();
},{once:true});

// hearts
setInterval(()=>{
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"vw";
  h.style.fontSize=(15+Math.random()*20)+"px";
  h.style.animationDuration=(4+Math.random()*4)+"s";
  document.getElementById("hearts").appendChild(h);
  setTimeout(()=>h.remove(),8000);
},300);

// typewriter
const text=`Hey Gauri 💖

I know we haven't talked much…
but something about you made me want to do this differently.

So here I am 🙂

Would you go on a cute little date with me? ✨`;

let i=0,selectedPlan="",selectedTime="";

function typeWriter(){
  if(i<text.length){
    document.getElementById("typewriter").innerHTML+=text[i++];
    setTimeout(typeWriter,35);
  }
}

function openEnvelope(){
  document.getElementById("envelope").classList.add("open");

  setTimeout(()=>{
    step1.classList.remove("active");
    step2.classList.add("active");

    setTimeout(()=>{
      letter.classList.add("show");
      typeWriter();
    },200);
  },1200);
}

// no button
noBtn.onmouseover=()=>{
  noBtn.style.left=Math.random()*(window.innerWidth-100)+"px";
  noBtn.style.top=Math.random()*(window.innerHeight-50)+"px";
};

function goToOptions(){
  step2.classList.remove("active");
  step3.classList.add("active");
}

function selectOption(opt){
  selectedPlan=opt;
  step3.classList.remove("active");
  step4.classList.add("active");
}

function selectTime(el,time){
  document.querySelectorAll(".time-card").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
  selectedTime=time;
}

// confetti
function confetti(){
  for(let i=0;i<100;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=(Math.random()>0.5?0:window.innerWidth)+"px";
    c.style.background=["#ff6b81","#ffd93d","#6bcB77","#4d96ff"][Math.floor(Math.random()*4)];
    c.style.animationDuration=(2+Math.random()*2)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}

// FINAL
function finish(){
  let date=document.getElementById("date").value;

  if(!date || !selectedTime){
    alert("Pick date & time 😄");
    return;
  }

  const formData=new FormData();
  formData.append("access_key","bbd67653-cc36-42ef-9bf4-75ce95191cf2");
  formData.append("subject","Date Plan 💖");
  formData.append("message",
`Plan: ${selectedPlan}
Date: ${date}
Time: ${selectedTime}`);

  fetch("https://api.web3forms.com/submit",{
    method:"POST",
    body:formData
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.success){
      document.getElementById("finalMessage").innerText=
`Hi Gauri 💖

For our ${selectedPlan} 💫  
Be ready on ${date} (${selectedTime}) ✨  
It's going to be special… I hope 😉`;

      confetti();

      step4.classList.remove("active");
      step5.classList.add("active");
    } else {
      alert("Submission failed 😅");
    }
  })
  .catch(()=>{
    alert("Network issue 😅");
  });
}
</script>

</body>
</html>
